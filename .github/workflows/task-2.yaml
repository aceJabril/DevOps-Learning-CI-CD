name: CI/CD Pipeline Task 2

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Install flake8
        run: pip install flake8

      - name: Run linting
        run: flake8 .

      - name: Run tests
        run: python -m unittest discover -s task-2/app -v

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: docker build -t acejabril/task-2-app:latest ./task-2/app

      - name: Push Docker image
        run: docker push acejabril/task-2-app:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/DevOps-Learning-CI-CD/task-2/app
            docker pull acejabril/task-2-app:latest
            docker-compose down
            docker-compose up -d

      - name: Notify success
        if: success()
        run: echo "Pipeline passed - app deployed to EC2"
