name: CI pipeline

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
        - name: Checkout code
          uses: actions/checkout@v2

        - name: Login to DockerHub
          uses: docker/login-action@v2
          with:
            username: ${{ secrets.DOCKER_USERNAME }}
            password: ${{ secrets.DOCKER_PASSWORD }}

        - name: Install flake8
          run: pip install flake8

        - name: Run linting
          run: flake8 .

        - name: Run tests
          run: python -m unittest discover -s task-1

        - name: Build Docker image
          run: docker build -t acejabril/task-1:latest ./task-1

        - name: Push docker image
          run: docker push acejabril/task-1:latest

        - name: Notify success
          if: success()
          run: echo "Pipeline passed successfully - image built and pushed"
